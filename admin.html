<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — ZeroToDigital</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0f1c; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; padding: 30px 20px; }
        h1, h2 { text-align: center; color: #00aaff; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #333; background: #111827; color: #fff; font-size: 0.95rem; }
        textarea { resize: vertical; min-height: 100px; }
        .btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .btn-primary { background: #00aaff; color: #fff; }
        .btn-primary:hover { background: #0095e0; transform: translateY(-1px); }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #25D366; color: #fff; }
        .post-item { background: #111827; padding: 16px; margin-bottom: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .post-info { flex: 1; }
        .post-info h3 { font-size: 1rem; margin-bottom: 4px; }
        .post-info p { color: #aaa; font-size: 0.8rem; }
        .actions { display: flex; gap: 8px; }
        .login-box { max-width: 360px; margin: 60px auto; background: #111827; padding: 30px; border-radius: 12px; }
        .hidden { display: none; }
        .message { text-align: center; margin: 10px 0; color: #ff6b6b; }
        .success { color: #4caf50; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .top-bar span { color: #aaa; font-size: 0.9rem; }
        #image-preview { max-width: 200px; max-height: 120px; object-fit: cover; margin-bottom: 8px; display: none; }
        @media (max-width: 500px) {
            .post-item { flex-direction: column; align-items: flex-start; gap: 10px; }
            .actions { width: 100%; justify-content: space-between; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="login-screen" class="login-box">
            <h2>🔐 Admin</h2>
            <input type="email" id="email" placeholder="E-mail" autocomplete="email">
            <input type="password" id="password" placeholder="Senha" autocomplete="current-password">
            <div id="login-message" class="message"></div>
            <button class="btn btn-primary" style="width:100%;" onclick="login()">Entrar</button>
        </div>

        <div id="admin-screen" class="hidden">
            <div class="top-bar">
                <h1>📰 Gerenciar Projetos</h1>
                <div>
                    <span id="user-email"></span>
                    <button class="btn btn-danger" style="margin-left:10px; padding:6px 14px; font-size:0.8rem;" onclick="logout()">Sair</button>
                </div>
            </div>

            <div id="form-box">
                <h2 id="form-title">Novo projeto</h2>
                <input type="hidden" id="edit-id">
                <input type="text" id="title" placeholder="Título do projeto" required>
                <textarea id="content" placeholder="Descrição do projeto"></textarea>
                <input type="url" id="project_url" placeholder="URL do projeto (ex: https://...)">
                
                <div style="margin-bottom:12px;">
                    <label style="display:block; margin-bottom:4px;">Imagem do projeto</label>
                    <input type="file" id="image_file" accept="image/*" style="border:none; background:transparent; padding-left:0;">
                    <img id="image-preview" src="#" alt="Preview">
                    <p style="font-size:0.75rem; color:#888;">Deixe em branco para manter a imagem atual (se editar).</p>
                </div>

                <label style="display:flex; align-items:center; gap:8px; margin-bottom:12px; color:#ccc;">
                    <input type="checkbox" id="published" checked> Publicado
                </label>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <button class="btn btn-primary" onclick="savePost()">💾 Salvar</button>
                    <button class="btn" style="background:#555;" onclick="cancelEdit()">Cancelar</button>
                </div>
                <div id="admin-message" class="message"></div>
            </div>

            <hr style="border-color:rgba(255,255,255,0.1); margin: 20px 0;">
            <h2 style="text-align:left;">Todos os projetos</h2>
            <div id="posts-list"></div>
        </div>
    </div>

    <script>
        // ⚙️ SUBSTITUÍDO COM AS TUAS CREDENCIAIS
        const SUPABASE_URL = 'https://gfympgdmoycsvsynsqjw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_nXfeMz-JMX1qx-JjlQle4A_Tjd2ZSW3';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        // Login
        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const msg = document.getElementById('login-message');
            if (!email || !password) { msg.textContent = 'Preencha todos os campos.'; return; }
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) { msg.textContent = 'Erro: ' + error.message; return; }
            currentUser = data.user;
            showAdmin();
        }

        async function logout() {
            await supabase.auth.signOut();
            currentUser = null;
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('admin-screen').classList.add('hidden');
        }

        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session?.user) { currentUser = session.user; showAdmin(); }
        }

        function showAdmin() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-screen').classList.remove('hidden');
            document.getElementById('user-email').textContent = currentUser.email;
            loadPosts();
        }

        // Upload de imagem para o Storage
        async function uploadImage(file) {
            const fileName = `${Date.now()}_${file.name}`;
            const { data, error } = await supabase.storage
                .from('project-images')
                .upload(fileName, file, {
                    cacheControl: '3600',
                    upsert: false
                });
            if (error) throw error;
            const { data: publicUrlData } = supabase.storage
                .from('project-images')
                .getPublicUrl(data.path);
            return publicUrlData.publicUrl;
        }

        // Salvar post
        async function savePost() {
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            const project_url = document.getElementById('project_url').value.trim() || null;
            const published = document.getElementById('published').checked;
            const fileInput = document.getElementById('image_file');
            const msg = document.getElementById('admin-message');
            msg.textContent = '';
            msg.className = 'message';

            if (!title || !content) {
                msg.textContent = 'Título e descrição são obrigatórios.';
                return;
            }

            let image_url = null;
            if (fileInput.files && fileInput.files[0]) {
                try {
                    msg.textContent = 'A enviar imagem...';
                    image_url = await uploadImage(fileInput.files[0]);
                } catch (err) {
                    msg.textContent = 'Erro no upload da imagem: ' + err.message;
                    return;
                }
            } else if (id) {
                const { data: existing } = await supabase.from('posts').select('image_url').eq('id', id).single();
                image_url = existing?.image_url || null;
            }

            const postData = { title, content, project_url, image_url, published };
            let query;
            if (id) {
                query = supabase.from('posts').update(postData).eq('id', id);
            } else {
                query = supabase.from('posts').insert([postData]);
            }

            const { error } = await query;
            if (error) {
                msg.textContent = 'Erro ao salvar: ' + error.message;
                return;
            }
            msg.textContent = id ? 'Projeto atualizado!' : 'Projeto criado!';
            msg.className = 'message success';
            cancelEdit();
            loadPosts();
            setTimeout(() => { msg.textContent = ''; msg.className = 'message'; }, 3000);
        }

        async function loadPosts() {
            const list = document.getElementById('posts-list');
            const { data, error } = await supabase.from('posts').select('*').order('created_at', { ascending: false });
            if (error) { list.innerHTML = `<p style="color:#ff6b6b;">Erro: ${error.message}</p>`; return; }
            if (!data.length) { list.innerHTML = '<p style="color:#aaa;">Nenhum projeto ainda.</p>'; return; }
            list.innerHTML = data.map(post => `
                <div class="post-item">
                    <div class="post-info">
                        <h3>${escapeHtml(post.title)} ${post.published ? '✅' : '⏳'}</h3>
                        <p>${new Date(post.created_at).toLocaleDateString('pt-PT')} ${post.image_url ? '📷' : ''}</p>
                    </div>
                    <div class="actions">
                        <button class="btn btn-primary" style="padding:6px 12px; font-size:0.8rem;" onclick="editPost('${post.id}')">Editar</button>
                        <button class="btn btn-danger" style="padding:6px 12px; font-size:0.8rem;" onclick="deletePost('${post.id}')">Apagar</button>
                    </div>
                </div>
            `).join('');
        }

        async function editPost(id) {
            const { data, error } = await supabase.from('posts').select('*').eq('id', id).single();
            if (error) { alert('Erro ao carregar'); return; }
            document.getElementById('edit-id').value = data.id;
            document.getElementById('title').value = data.title;
            document.getElementById('content').value = data.content;
            document.getElementById('project_url').value = data.project_url || '';
            document.getElementById('published').checked = data.published;
            document.getElementById('form-title').textContent = 'Editar projeto';
            const preview = document.getElementById('image-preview');
            if (data.image_url) {
                preview.src = data.image_url;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
            document.getElementById('image_file').value = '';
        }

        function cancelEdit() {
            document.getElementById('edit-id').value = '';
            document.getElementById('title').value = '';
            document.getElementById('content').value = '';
            document.getElementById('project_url').value = '';
            document.getElementById('published').checked = true;
            document.getElementById('form-title').textContent = 'Novo projeto';
            document.getElementById('image_file').value = '';
            document.getElementById('image-preview').style.display = 'none';
            document.getElementById('admin-message').textContent = '';
        }

        async function deletePost(id) {
            if (!confirm('Apagar este projeto?')) return;
            const { error } = await supabase.from('posts').delete().eq('id', id);
            if (error) { document.getElementById('admin-message').textContent = 'Erro: ' + error.message; }
            else loadPosts();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('image_file').addEventListener('change', function() {
            const preview = document.getElementById('image-preview');
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(this.files[0]);
            } else {
                preview.style.display = 'none';
            }
        });

        checkSession();
    </script>
</body>
</html>
